<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>conch3d — interactive</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<style>
  body { margin: 0; background: #0e0b08; color: #ddd; font: 13px/1.4 -apple-system, sans-serif; }
  #canvas-holder { position: fixed; inset: 0; }
  #panel {
    position: fixed; top: 12px; left: 12px; padding: 12px 14px;
    background: rgba(20,18,15,0.88); border: 1px solid #3a322a; border-radius: 6px;
    width: 300px; max-height: calc(100vh - 24px); overflow-y: auto;
  }
  #panel h1 { margin: 0 0 8px; font-size: 13px; font-weight: 600; }
  #panel h2 { margin: 10px 0 4px; font-size: 11px; font-weight: 600; color: #bda282; text-transform: uppercase; letter-spacing: 0.06em; }
  #panel .row { margin: 6px 0; }
  #panel label { display: block; font-size: 11px; color: #aaa; }
  #panel input[type=range] { width: 100%; }
  #panel .val { color: #fff; font-variant-numeric: tabular-nums; }
  #panel .hint { margin-top: 10px; font-size: 11px; color: #888; }
  #panel button { padding: 6px 8px; background: #2a241d; color: #ddd; border: 1px solid #4a3f32;
    border-radius: 4px; cursor: pointer; font: inherit; margin: 2px 0; }
  #panel button:hover { background: #3a3025; }
  #panel .presets { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  #panel .wide { grid-column: span 2; }
</style>
</head>
<body>
<div id="canvas-holder"></div>
<div id="panel">
  <h1>conch3d — Contreras-Figueroa & Aragón 2023</h1>

  <h2>Spiral (γ)</h2>
  <div class="row">
    <label>b — whorl expansion: <span class="val" id="v-b"></span></label>
    <input type="range" id="b" min="0" max="2" step="0.001" value="0.12">
  </div>
  <div class="row">
    <label>d — horizontal distance: <span class="val" id="v-d"></span></label>
    <input type="range" id="d" min="0.1" max="5" step="0.01" value="0.9">
  </div>
  <div class="row">
    <label>z — vertical translation: <span class="val" id="v-z"></span></label>
    <input type="range" id="z" min="-8" max="8" step="0.01" value="3.0">
  </div>

  <h2>Aperture (generating curve)</h2>
  <div class="row">
    <label>a — major/minor ratio: <span class="val" id="v-a"></span></label>
    <input type="range" id="a" min="0.2" max="3" step="0.01" value="1.0">
  </div>
  <div class="row">
    <label>φ — initial tilt: <span class="val" id="v-phi"></span></label>
    <input type="range" id="phi" min="0" max="3.14159" step="0.005" value="0">
  </div>
  <div class="row">
    <label>ψ — rotation around B: <span class="val" id="v-psi"></span></label>
    <input type="range" id="psi" min="-1.5708" max="1.5708" step="0.005" value="0">
  </div>

  <h2>Ornamentation (extra)</h2>
  <div class="row">
    <label>n — aperture peaks: <span class="val" id="v-n"></span></label>
    <input type="range" id="n" min="0" max="30" step="1" value="0">
  </div>
  <div class="row">
    <label>c — rib frequency: <span class="val" id="v-c"></span></label>
    <input type="range" id="c" min="0" max="40" step="0.5" value="0">
  </div>
  <div class="row">
    <label>ornament amplitude: <span class="val" id="v-orn"></span></label>
    <input type="range" id="orn" min="0" max="0.3" step="0.005" value="0.1">
  </div>
  <div class="row">
    <label>k — aperture displacement: <span class="val" id="v-k"></span></label>
    <input type="range" id="k" min="-2" max="2" step="0.01" value="0">
  </div>

  <h2>Rendering</h2>
  <div class="row">
    <label>whorls (t range / 2π): <span class="val" id="v-turns"></span></label>
    <input type="range" id="turns" min="2" max="12" step="0.1" value="6">
  </div>

  <h2>Gastropoda — helicoidal</h2>
  <div class="presets">
    <button data-preset="asperiscala">Asperiscala pacis</button>
    <button data-preset="acteon">Acteon sullivanae</button>
    <button data-preset="lirularia">Lirularia pedroana</button>
    <button data-preset="brachysphingus">Brachysphingus mam.</button>
    <button data-preset="biplica" class="wide">Biplica obliqua</button>
  </div>

  <h2>Gastropoda — limpets</h2>
  <div class="presets">
    <button data-preset="scelidotoma">Scelidotoma bella</button>
    <button data-preset="crepidula">Crepidula adunca</button>
  </div>

  <h2>Cephalopoda</h2>
  <div class="presets">
    <button data-preset="oregoniceras">Oregoniceras sisk.</button>
    <button data-preset="nautilus">Nautilus cookanum</button>
    <button data-preset="cleoniceras">Cleoniceras susukii</button>
    <button data-preset="shasticrioceras">Shasticrioceras pat.</button>
    <button data-preset="baculites" class="wide">Baculites boulei (ortho)</button>
  </div>

  <h2>Bivalvia</h2>
  <div class="presets">
    <button data-preset="cucullaea">Cucullaea morani</button>
    <button data-preset="glycymerita">Glycymerita ban.</button>
    <button data-preset="indogrammatodon" class="wide">Indogrammatodon van.</button>
    <button data-preset="scallop" class="wide">Scallop</button>
  </div>

  <div class="presets">
    <button data-preset="reset" class="wide">Reset</button>
  </div>

  <div class="hint">Drag to orbit · scroll to zoom</div>
</div>

<script>
/*
 * Port of the six-parameter mollusc-shell model from:
 *
 *   Contreras-Figueroa, G. & Aragón, J. L. (2023)
 *   "A Mathematical Model for Mollusc Shells Based on Parametric Surfaces
 *    and the Construction of Theoretical Morphospaces"
 *   Diversity 15(3), 431.  https://doi.org/10.3390/d15030431
 *
 * Eq. (12), in compact form:
 *
 *   λ(t, θ) = γ(t) + C(t, θ)
 *
 * Logarithmic spiral (coiling axis = z):
 *   γ(t) = e^{bt} · ( d sin t,  d cos t,  z )
 *
 * Frenet frame on γ(t):
 *   T(t) = ( d(b sin t + cos t),  d(b cos t − sin t),  b z ) / sqrt((b²+1) d² + b² z²)
 *   N(t) = ( b cos t − sin t,    −b sin t − cos t,    0   ) / sqrt(b²+1)
 *   B(t) = ( b z (b sin t + cos t), b z (b cos t − sin t), d (b²+1) )
 *          / sqrt((b²+1)((b²+1) d² + b² z²))
 *
 * Elliptical generating curve in the N-B plane, tilted by φ and rotated by ψ
 * around B, with apex closure 1 − 1/(t+1):
 *   C(t, θ) = e^{bt} · (1 − 1/(t+1)) · R_B(ψ) ·
 *             [ ( a sin θ cos φ + cos θ sin φ ) N(t)
 *             + ( a sin θ sin φ − cos θ cos φ ) B(t) ]
 *
 * Rotation around the local B axis (eq. 10):
 *   applied to α N + β B  ⇒  (α cos ψ) N + (α sin ψ) T + β B
 *
 * Optional ornamentation (eqs. 20–21):
 *   radial factor (1 + orn · sin(n θ)) on the aperture,
 *   radial factor (1 + orn · sin(c t)) on the whole generating curve.
 *
 * Parameters (six principal):
 *   b   0 ≤ b < ∞     whorl expansion rate
 *   d   0 < d < ∞     horizontal distance to coiling axis
 *   z   −∞ < z < ∞    vertical translation (dextral z>0, planispiral z=0)
 *   a   0 < a < ∞     major/minor aperture ratio
 *   φ   0 ≤ φ < π     initial tilt of the aperture
 *   ψ   0 ≤ ψ < π/2   rotation around the local binormal
 */

const SLIDERS = ['b', 'd', 'z', 'a', 'phi', 'psi', 'n', 'c', 'orn', 'k', 'turns'];

const defaults = {
  b: 0.12, d: 0.9, z: 3.0,
  a: 1.0, phi: 0, psi: 0,
  n: 0, c: 0, orn: 0.1, k: 0,
  turns: 6,
};

// Parameter sets from Table 1 of Contreras-Figueroa & Aragón 2023.
// NA values for ψ are rendered as 0 (the model's neutral aperture rotation).
// `turns` is not in the table — picked per specimen so the rendered shell
// shows enough whorls without going past the apex.
const PRESETS = {
  reset:           defaults,
  // Gastropoda — helicoidal
  asperiscala:     { b: 0.0453, d: 0.7154,  z: 5.8725, a: 0.8984, phi: 0.07113, psi: 0,     n: 0, c: 0, orn: 0.1,  turns: 12 },
  acteon:          { b: 0.0658, d: 0.4258,  z: 2.6922, a: 0.4542, phi: 0.2544, psi: 0,     n: 0, c: 0, orn: 0.1,  turns: 10 },
  lirularia:       { b: 0.0922, d: 0.9172,  z: 2.2916, a: 0.9483, phi: 0.1221, psi: 0,     n: 0, c: 0, orn: 0.1,  turns: 9 },
  brachysphingus:  { b: 0.0882, d: 0.4036,  z: 1.5551, a: 0.6203, phi: 0.3001, psi: 0,     n: 0, c: 0, orn: 0.1,  turns: 9 },
  biplica:         { b: 0.1050, d: 0.3316,  z: 1.1754, a: 0.8274, phi: 0.1196, psi: 0.6152, n: 0, c: 0, orn: 0.1, turns: 8 },
  // Gastropoda — limpets (measured as valve-like)
  scelidotoma:     { b: 1.0245, d: 1.1292,  z: 0,      a: 1.7963, phi: 0,      psi: 0.2,    n: 0, c: 0, orn: 0.1,  turns: 1.2 },
  crepidula:       { b: 1.0860, d: 1.3407,  z: 0,      a: 1.2335, phi: 0,      psi: 0.3501, n: 0, c: 0, orn: 0.1,  turns: 1.2 },
  // Cephalopoda — planispiral / heteromorph / orthocone
  oregoniceras:    { b: 0.1377, d: 2.4060,  z: 0,      a: 1.3921, phi: 0,      psi: 0,      n: 0, c: 0, orn: 0.1,  turns: 5 },
  nautilus:        { b: 0.1816, d: 0.9825,  z: 0,      a: 0.9036, phi: 0,      psi: 0,      n: 0, c: 0, orn: 0.1,  turns: 5 },
  cleoniceras:     { b: 0.1321, d: 3.3316,  z: 0,      a: 2.4234, phi: 0,      psi: 0,      n: 0, c: 0, orn: 0.1,  turns: 4 },
  shasticrioceras: { b: 0.1009, d: 3.07951, z: 0,      a: 1.6098, phi: 0,      psi: 0,      n: 0, c: 0, orn: 0.1,  turns: 3 },
  baculites:       { b: 5,      d: 16.044,  z: 0,      a: 0.9913, phi: 0,      psi: 0,      n: 0, c: 0, orn: 0.1,  turns: 1.2 },
  // Bivalvia — valve-like
  cucullaea:       { b: 0.7364, d: 0.8726,  z: 0,      a: 0.7293, phi: 0.1930, psi: 0.3321, n: 0, c: 0, orn: 0.1,  turns: 1.2 },
  glycymerita:     { b: 0.7198, d: 0.8866,  z: 0,      a: 0.8567, phi: 0.0193, psi: 0.5707, n: 0, c: 0, orn: 0.1,  turns: 1.2 },
  indogrammatodon: { b: 0.8031, d: 0.6217,  z: 0,      a: 0.6003, phi: 0.1924, psi: 0.6119, n: 0, c: 0, orn: 0.1,  turns: 1.2 },
  scallop:         { b: 0.736,  d: 0.680,   z: 0,      a: 0.730,  phi: 0.195,  psi: -0.612, n: 21, c: 0, orn: 0.1, k: -0.010, turns: 2 },
};

const vals = { ...defaults };
let dirty = true;

SLIDERS.forEach(id => {
  const el = document.getElementById(id);
  const out = document.getElementById('v-' + id);
  const update = () => {
    vals[id] = parseFloat(el.value);
    out.textContent = (id === 'n') ? vals[id].toFixed(0) : vals[id].toFixed(3);
    dirty = true;
  };
  el.addEventListener('input', update);
  update();
});

const applyPreset = (name) => {
  const p = PRESETS[name];
  for (const id in p) {
    const el = document.getElementById(id);
    el.value = p[id];
    el.dispatchEvent(new Event('input'));
  }
};

document.querySelectorAll('#panel button[data-preset]').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

applyPreset('lirularia');

let uiDrag = false;
let uiHover = false;
const panelEl = document.getElementById('panel');
panelEl.addEventListener('pointerdown', () => { uiDrag = true; });
panelEl.addEventListener('pointerenter', () => { uiHover = true; });
panelEl.addEventListener('pointerleave', () => { uiHover = false; });
window.addEventListener('pointerup', () => { uiDrag = false; });
window.addEventListener('pointercancel', () => { uiDrag = false; });

// Let the panel scroll natively when the cursor is over it; stop the wheel
// event before p5's WEBGL orbitControl sees it (which would zoom the camera).
// Capture phase + non-passive so we can stopPropagation reliably.
window.addEventListener('wheel', (e) => {
  if (panelEl.contains(e.target)) {
    e.stopPropagation();
  }
}, { capture: true, passive: true });

// Mesh resolution
const T_STEPS = 520;
const THETA_STEPS = 64;
const TARGET_SIZE = 600;  // world-space size the shell is normalized to fit

new p5((p) => {
  let geom = null;

  const buildGeometry = () => {
    const g = new p5.Geometry();

    const { b, d, z, a, phi, psi, n, c, orn, k, turns } = vals;
    const tMin = 0;
    const tMax = 2 * Math.PI * turns;
    const dt = (tMax - tMin) / T_STEPS;
    const dTheta = (2 * Math.PI) / THETA_STEPS;

    const cphi = Math.cos(phi), sphi = Math.sin(phi);
    const cpsi = Math.cos(psi), spsi = Math.sin(psi);

    // Precompute the Frenet denominators (independent of t for the normal,
    // but recomputed in-loop for the tangent/binormal).
    const nNorm = Math.sqrt(b * b + 1);

    // Two passes: first compute raw vertices and track the bounding box,
    // then normalize so the shell fits in TARGET_SIZE regardless of b · turns.
    const raw = [];
    let minX = Infinity, minY = Infinity, minZ = Infinity;
    let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;

    for (let i = 0; i <= T_STEPS; i++) {
      const t = tMin + i * dt;
      const ebt = Math.exp(b * t);
      const st = Math.sin(t), ct = Math.cos(t);

      // γ(t)
      const gx = ebt * d * st;
      const gy = ebt * d * ct;
      const gz = ebt * z;

      // Tangent
      const tRawX = d * (b * st + ct);
      const tRawY = d * (b * ct - st);
      const tRawZ = b * z;
      const tMag = Math.sqrt((b * b + 1) * d * d + b * b * z * z);
      const Tx = tRawX / tMag, Ty = tRawY / tMag, Tz = tRawZ / tMag;

      // Normal
      const Nx = (b * ct - st) / nNorm;
      const Ny = (-b * st - ct) / nNorm;
      const Nz = 0;

      // Binormal
      const bMag = Math.sqrt((b * b + 1) * ((b * b + 1) * d * d + b * b * z * z));
      const Bx = (b * z * (b * st + ct)) / bMag;
      const By = (b * z * (b * ct - st)) / bMag;
      const Bz = (d * (b * b + 1)) / bMag;

      // Aperture size envelope (apex closure + optional rib oscillation)
      const apex = 1 - 1 / (t + 1);
      const ribs = (c > 0) ? (1 + orn * Math.sin(c * t)) : 1;
      const envelope = ebt * apex * ribs;

      for (let j = 0; j <= THETA_STEPS; j++) {
        const theta = j * dTheta;
        const sTh = Math.sin(theta), cTh = Math.cos(theta);

        // Tilted ellipse (eq. 4) in (N,B) components, with optional petal oscillation.
        const ornTheta = (n > 0) ? (1 + orn * Math.sin(n * theta)) : 1;
        const alphaN = (a * sTh * cphi + cTh * sphi) * ornTheta;  // N component
        const betaB  = (a * sTh * sphi - cTh * cphi) * ornTheta + k;  // B component (eq. 22 hinge offset)

        // Rotate around local B by ψ:  α N + β B  ⇒  α cψ N + α sψ T + β B
        const wN = alphaN * cpsi;
        const wT = alphaN * spsi;
        const wB = betaB;

        // C(t, θ) in world coordinates
        const cx = envelope * (wN * Nx + wT * Tx + wB * Bx);
        const cy = envelope * (wN * Ny + wT * Ty + wB * By);
        const cz = envelope * (wN * Nz + wT * Tz + wB * Bz);

        // λ(t, θ) = γ + C.  p5 WEBGL has +Y pointing down on screen, so the
        // shell's z-axis (apex up) maps to +Y.
        const X =  (gx + cx);
        const Y =  (gz + cz);
        const Z =  (gy + cy);

        raw.push(X, Y, Z);
        if (X < minX) minX = X; if (X > maxX) maxX = X;
        if (Y < minY) minY = Y; if (Y > maxY) maxY = Y;
        if (Z < minZ) minZ = Z; if (Z > maxZ) maxZ = Z;
      }
    }

    // Center on bbox and uniformly scale to fit TARGET_SIZE.
    const cx0 = 0.5 * (minX + maxX);
    const cy0 = 0.5 * (minY + maxY);
    const cz0 = 0.5 * (minZ + maxZ);
    const extent = Math.max(maxX - minX, maxY - minY, maxZ - minZ) || 1;
    const s = TARGET_SIZE / extent;
    for (let k = 0; k < raw.length; k += 3) {
      g.vertices.push(p.createVector(
        (raw[k]     - cx0) * s,
        (raw[k + 1] - cy0) * s,
        (raw[k + 2] - cz0) * s,
      ));
    }

    const cols = THETA_STEPS + 1;
    for (let i = 0; i < T_STEPS; i++) {
      for (let j = 0; j < THETA_STEPS; j++) {
        const a0 = i * cols + j;
        const b0 = (i + 1) * cols + j;
        const c0 = (i + 1) * cols + j + 1;
        const d0 = i * cols + j + 1;
        g.faces.push([a0, b0, c0]);
        g.faces.push([a0, c0, d0]);
      }
    }

    g.computeNormals();
    return g;
  };

  const setProjection = () => {
    const fov = Math.PI / 3;
    const aspect = p.width / p.height;
    p.perspective(fov, aspect, 1, 20000);
  };

  p.setup = () => {
    const c = p.createCanvas(p.windowWidth, p.windowHeight, p.WEBGL);
    c.parent('canvas-holder');
    p.noStroke();
    setProjection();
  };

  p.windowResized = () => {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    setProjection();
  };

  p.draw = () => {
    if (dirty) {
      if (geom) p.freeGeometry(geom);
      geom = buildGeometry();
      dirty = false;
    }

    p.clear();
    p.background(14, 11, 8);
    if (!uiDrag && !uiHover) p.orbitControl(4, 4);
    p.rotateX(Math.PI / 10);

    p.ambientLight(80, 70, 55);
    p.directionalLight(255, 240, 215, 0.5, -0.7, -0.5);
    p.directionalLight(170, 130, 90, -0.6, -0.3, -0.4);
    p.ambientMaterial(245, 225, 190);
    p.fill(245, 225, 190);
    p.specularMaterial(255, 240, 215);
    p.shininess(50);

    p.model(geom);
  };
});
</script>
</body>
</html>
